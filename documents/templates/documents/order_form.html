{% extends 'base.html' %}

{% block title %}Yangi Buyruq - Academic OS{% endblock %}

{% block page_title %}Yangi Buyruq Yuklash{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary fw-bold">Buyruq Ma'lumotlari</h5>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="order_number" class="form-label fw-bold">Buyruq Raqami</label>
                        <input type="text" class="form-control" id="order_number" name="order_number"
                            placeholder="Masalan: 12-B" required>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Buyruq Mavzusi</label>
                        <input type="text" class="form-control" id="title" name="title"
                            placeholder="Masalan: O'qituvchilarni mukofotlash to'g'risida" required>
                    </div>

                    <div class="mb-3">
                        <label for="date_signed" class="form-label fw-bold">Imzolangan Sana</label>
                        <input type="date" class="form-control" id="date_signed" name="date_signed" required>
                    </div>

                    <div class="mb-4">
                        <label for="file" class="form-label fw-bold">Buyruq Fayli (PDF/Word)</label>
                        <input type="file" class="form-control" id="file" name="file" accept=".pdf,.doc,.docx" required>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'order_list' %}" class="btn btn-light border">Bekor qilish</a>
                        <button type="submit" class="btn btn-primary px-4"><i
                                class="bi bi-upload me-2"></i>Yuklash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
