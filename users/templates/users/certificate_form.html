{% extends 'base.html' %}

{% block title %}Sertifikat Qo'shish - Academic OS{% endblock %}

{% block page_title %}Yangi Sertifikat Qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary fw-bold">Sertifikat Ma'lumotlari</h5>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Sertifikat Nomi <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                            placeholder="Masalan: IELTS 7.5, CEFR C1" required>
                    </div>

                    <div class="mb-3">
                        <label for="issuer" class="form-label fw-bold">Beruvchi Tashkilot</label>
                        <input type="text" class="form-control" id="issuer" name="issuer"
                            placeholder="Masalan: British Council">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date_issued" class="form-label fw-bold">Berilgan Sana <span
                                    class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="date_issued" name="date_issued" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="expiry_date" class="form-label fw-bold">Amal Qilish Muddati</label>
                            <input type="date" class="form-control" id="expiry_date" name="expiry_date">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="file" class="form-label fw-bold">Sertifikat Fayli (PDF/JPG)</label>
                        <input type="file" class="form-control" id="file" name="file" accept=".pdf,.jpg,.jpeg,.png">
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'profile' %}" class="btn btn-light border">Bekor qilish</a>
                        <button type="submit" class="btn btn-primary px-4"><i
                                class="bi bi-check-lg me-2"></i>Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
