{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Login - Academic OS" %}{% endblock %}

{% block layout %}
<div class="d-flex justify-content-center align-items-center min-vh-100 login-body">
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow-sm"
                    style="width: 64px; height: 64px;">
                    <i class="bi bi-mortarboard-fill fs-2"></i>
                </div>
                <h3 class="fw-bold text-dark">Academic OS</h3>
                <p class="text-muted small">{% trans "Sign in to your account" %}</p>
            </div>

            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    {% trans "Invalid username or password." %}
                </div>
                {% endif %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">{% trans "Username" %}</label>
                    <input type="text" name="username" class="form-control" required id="id_username"
                        placeholder="{% trans " Enter your username" %}">
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">{% trans "Password" %}</label>
                    <input type="password" name="password" class="form-control" required id="id_password"
                        placeholder="{% trans " Enter your password" %}">
                </div>

                <button type="submit" class="btn btn-primary w-100">{% trans "Sign In" %}</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
