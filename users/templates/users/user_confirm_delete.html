{% extends "base.html" %}

{% block page_title %}Xodimni O'chirish{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade-in-up">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4 border-danger border-2">
            <div class="card-body p-5 text-center">
                <div class="rounded-circle bg-danger-subtle d-flex align-items-center justify-content-center mx-auto mb-4"
                    style="width:70px;height:70px;">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-2"></i>
                </div>
                <h5 class="fw-bold mb-2">Xodimni o'chirishni tasdiqlaysizmi?</h5>
                <p class="text-muted mb-4">
                    <strong>{{ employee.get_full_name|default:employee.username }}</strong>
                    ({{ employee.username }}) tizimdan butunlay o'chiriladi.
                </p>
                <div class="d-flex gap-3 justify-content-center">
                    <a href="{% url 'user_management' %}" class="btn btn-outline-secondary rounded-3 px-4">
                        <i class="bi bi-x-lg me-1"></i> Bekor qilish
                    </a>
                    <form method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger rounded-3 px-4">
                            <i class="bi bi-trash me-1"></i> Ha, o'chirish
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
